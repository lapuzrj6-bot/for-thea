<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You Be ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts"></div>

<audio autoplay loop id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="letter-box fade">

<h1>Hi Be ❤️</h1>

<p class="typewriter">
Hi Thea, you are my favorite person in the world.
This website is just a small piece of my love for you.
</p>

<p>
You make my life brighter, happier, and more meaningful.
I love you forever Be 🌷
</p>

<button onclick="surprise()" class="surprise-btn">Click for surprise 💝</button>

<p id="surpriseText"></p>

</div>

<script>
document.body.addEventListener("click",function(){
document.getElementById("music").play();
});

function surprise(){
document.getElementById("surpriseText").innerHTML="I LOVE YOU SO MUCH BE ❤️🌷";
}

// floating hearts
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}
setInterval(createHeart,300);
</script>

</body>
</html>
